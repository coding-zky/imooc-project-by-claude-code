<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>注册 - LightLedger / 轻账本</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-background": "#191c1d",
              "surface-variant": "#e1e3e4",
              "surface-container-lowest": "#ffffff",
              "outline-variant": "#c3c6d7",
              "tertiary-fixed": "#ffddb8",
              "secondary-fixed": "#6ffbbe",
              outline: "#737686",
              "inverse-on-surface": "#f0f1f2",
              "surface-bright": "#f8f9fa",
              "on-secondary": "#ffffff",
              "primary-fixed-dim": "#b4c5ff",
              "on-error": "#ffffff",
              "secondary-container": "#6cf8bb",
              "on-primary-container": "#eeefff",
              "inverse-surface": "#2e3132",
              "surface-container-highest": "#e1e3e4",
              "on-tertiary-container": "#ffeedd",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed": "#2a1700",
              border: "#E5E7EB",
              "inverse-primary": "#b4c5ff",
              "tertiary-container": "#996100",
              error: "#EF4444",
              "on-secondary-fixed": "#002113",
              "on-error-container": "#93000a",
              "on-secondary-fixed-variant": "#005236",
              background: "#f8f9fa",
              "surface-container-high": "#e7e8e9",
              "on-tertiary-fixed-variant": "#653e00",
              "on-primary-fixed": "#00174b",
              "on-primary-fixed-variant": "#003ea8",
              "on-surface-variant": "#434655",
              "text-secondary": "#6B7280",
              "surface-container": "#edeeef",
              primary: "#2563EB",
              "secondary-fixed-dim": "#4edea3",
              "surface-dim": "#d9dadb",
              surface: "#FFFFFF",
              "surface-tint": "#0053db",
              "primary-hover": "#1D4ED8",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#ffb95f",
              "on-surface": "#191c1d",
              "on-secondary-container": "#00714d",
              "on-primary": "#ffffff",
              secondary: "#006c49",
              "primary-fixed": "#dbe1ff",
              "text-primary": "#111827",
              tertiary: "#784b00",
              "primary-container": "#2563eb",
              "on-tertiary": "#ffffff",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              md: "16px",
              xl: "32px",
              "layout-margin": "24px",
              "layout-gutter": "16px",
              xs: "8px",
              sm: "12px",
              lg: "24px",
              base: "4px",
            },
            fontFamily: {
              "headline-card": ["Inter", "sans-serif"],
              "label-helper": ["Inter", "sans-serif"],
              "display-title-mobile": ["Inter", "sans-serif"],
              "body-secondary": ["Inter", "sans-serif"],
              "display-title": ["Inter", "sans-serif"],
              "body-main": ["Inter", "sans-serif"],
            },
            fontSize: {
              "headline-card": [
                "18px",
                {
                  lineHeight: "26px",
                  letterSpacing: "-0.01em",
                  fontWeight: "600",
                },
              ],
              "label-helper": [
                "12px",
                { lineHeight: "16px", fontWeight: "400" },
              ],
              "display-title-mobile": [
                "20px",
                { lineHeight: "28px", fontWeight: "600" },
              ],
              "body-secondary": [
                "14px",
                { lineHeight: "20px", fontWeight: "400" },
              ],
              "display-title": [
                "24px",
                {
                  lineHeight: "32px",
                  letterSpacing: "-0.02em",

                },
              ],
              "body-main": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fa;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .custom-shadow {
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.04);
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen">
    <main class="flex items-center justify-center flex-grow px-md py-xl">
      <div class="w-full max-w-[440px]">
        <!-- Logo & Brand Anchor -->
        <div class="flex flex-col items-center mb-lg">
          <div
            class="flex items-center justify-center w-12 h-12 shadow-lg bg-primary rounded-xl mb-sm shadow-primary/20"
          >
            <span
              class="material-symbols-outlined text-white text-[28px]"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >account_balance_wallet</span
            >
          </div>
          <h1
            class="tracking-tight font-display-title text-display-title text-primary"
          >
            轻账本
          </h1>
        </div>
        <!-- Registration Card -->
        <div
          class="border bg-surface border-border rounded-xl p-md md:p-lg custom-shadow"
        >
          <div class="text-center mb-lg">
            <h2
              class="font-display-title text-display-title text-text-primary mb-xs"
            >
              创建新账号
            </h2>
            <p
              class="font-body-secondary text-body-secondary text-text-secondary"
            >
              加入轻账本，开始简单高效的记账生活。
            </p>
          </div>
          <form class="space-y-md" id="registrationForm">
            <!-- Username -->
            <div class="space-y-xs">
              <label
                class="block font-label-helper text-label-helper text-on-surface-variant"
                for="username"
                >用户名</label
              >
              <div class="relative">
                <span
                  class="absolute text-sm -translate-y-1/2 material-symbols-outlined left-3 top-1/2 text-outline"
                  >person</span
                >
                <input
                  class="w-full pl-10 transition-all border rounded-lg pr-md py-sm border-border bg-surface-bright focus:outline-none focus:ring-2 focus:ring-primary/10 focus:border-primary font-body-main text-body-main"
                  id="username"
                  name="username"
                  placeholder="4-20个字符，支持字母、数字、下划线"
                  type="text"
                />
              </div>
            </div>
            <!-- Password -->
            <div class="space-y-xs">
              <label
                class="block font-label-helper text-label-helper text-on-surface-variant"
                for="password"
                >密码</label
              >
              <div class="relative">
                <span
                  class="absolute text-sm -translate-y-1/2 material-symbols-outlined left-3 top-1/2 text-outline"
                  >lock</span
                >
                <input
                  class="w-full pl-10 transition-all border rounded-lg pr-md py-sm border-border bg-surface-bright focus:outline-none focus:ring-2 focus:ring-primary/10 focus:border-primary font-body-main text-body-main"
                  id="password"
                  name="password"
                  placeholder="至少6个字符"
                  type="password"
                />
              </div>
            </div>
            <!-- Confirm Password -->
            <div class="space-y-xs">
              <label
                class="block font-label-helper text-label-helper text-on-surface-variant"
                for="confirm_password"
                >确认密码</label
              >
              <div class="relative">
                <span
                  class="absolute text-sm -translate-y-1/2 material-symbols-outlined left-3 top-1/2 text-outline"
                  >lock_reset</span
                >
                <input
                  class="w-full pl-10 transition-all border rounded-lg pr-md py-sm border-border bg-surface-bright focus:outline-none focus:ring-2 focus:ring-primary/10 focus:border-primary font-body-main text-body-main"
                  id="confirm_password"
                  name="confirm_password"
                  placeholder="请再次输入密码"
                  type="password"
                />
              </div>
            </div>
            <!-- Checkbox -->
            <div class="flex items-start gap-xs py-xs">
              <input
                class="w-4 h-4 mt-1 rounded border-border text-primary focus:ring-primary/20"
                id="terms"
                name="terms"
                type="checkbox"
              />
              <label
                class="leading-tight font-label-helper text-label-helper text-text-secondary"
                for="terms"
              >
                我已阅读并同意
                <a class="transition-all text-primary hover:underline" href="#"
                  >服务协议</a
                >
                和
                <a class="transition-all text-primary hover:underline" href="#"
                  >隐私政策</a
                >
              </label>
            </div>
            <!-- Primary Button -->
            <button
              class="w-full bg-primary text-white font-headline-card text-headline-card py-sm rounded-lg hover:bg-primary-hover active:scale-[0.98] transition-all flex items-center justify-center gap-xs shadow-md shadow-primary/10"
              type="submit"
            >
              立即注册
            </button>
          </form>
          <!-- Login Link -->
          <div class="text-center mt-lg">
            <p
              class="font-body-secondary text-body-secondary text-text-secondary"
            >
              已有账号？<a
                class="font-semibold transition-all text-primary hover:underline"
                href="#"
                >立即登录</a
              >
            </p>
          </div>
        </div>
      </div>
    </main>
    <!-- Footer -->
    <footer class="w-full py-lg px-layout-margin">
      <div
        class="max-w-[1280px] mx-auto flex flex-col md:flex-row justify-between items-center gap-md"
      >
        <div class="font-label-helper text-label-helper text-outline">
          © 2024 轻账本. 保留所有权利.
        </div>
        <div class="flex items-center gap-lg">
          <a
            class="transition-colors font-label-helper text-label-helper text-text-secondary hover:text-primary"
            href="#"
            >帮助中心</a
          >
          <a
            class="transition-colors font-label-helper text-label-helper text-text-secondary hover:text-primary"
            href="#"
            >语言设置</a
          >
          <a
            class="transition-colors font-label-helper text-label-helper text-text-secondary hover:text-primary"
            href="#"
            >安全保障</a
          >
        </div>
      </div>
    </footer>
    <script>
      // Micro-interactions and simple form handling
      const form = document.getElementById("registrationForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const btn = e.target.querySelector("button");
        const originalText = btn.innerText;

        // Visual feedback for clicking
        btn.innerHTML =
          '<span class="material-symbols-outlined animate-spin">sync</span> 正在创建...';
        btn.disabled = true;

        setTimeout(() => {
          // Simulate success/navigation
          console.log("Account created simulation");
          btn.innerHTML = originalText;
          btn.disabled = false;
        }, 1500);
      });

      // Interactive focus animations handled by Tailwind (focus:ring)
    </script>
  </body>
</html>
