  <body class="flex flex-col min-h-screen bg-background text-on-background">

    <main class="flex-1 flex max-w-[1280px] w-full mx-auto">
      <!-- SideNavBar -->
      <aside
        class="flex flex-col hidden w-64 h-full border-r bg-surface dark:bg-surface-dim border-border dark:border-outline-variant py-lg px-md gap-sm md:flex"
      >
        <div class="px-sm mb-lg">
          <h1
            class="font-headline-card text-headline-card text-on-surface dark:text-inverse-on-surface"
          >
            设置

          <p
            class="font-body-secondary text-body-secondary text-text-secondary"
          >
            管理您的账户

        </div>
        <nav class="space-y-1">
          <a
            class="flex items-center gap-sm px-sm py-md rounded-lg text-text-secondary dark:text-on-surface-variant font-body-secondary text-body-secondary hover:bg-surface-container dark:hover:bg-surface-container-high transition-all active:scale-[0.98]"
            href="#"
            ><span class="material-symbols-outlined" data-icon="person"
              >person</span
            ><span class="">个人资料</span></a
          ><a
            class="flex items-center gap-sm px-sm py-md rounded-lg text-text-secondary dark:text-on-surface-variant font-body-secondary text-body-secondary hover:bg-surface-container dark:hover:bg-surface-container-high transition-all active:scale-[0.98]"
            href="#"

              >shield</span

            href="#"

              >settings</span
            ><span class="">偏好设置</span></a

        </nav>
        <div
          class="mt-auto border-t pt-lg border-border dark:border-outline-variant"
        >
          <button
            class="flex items-center gap-sm px-sm py-md w-full rounded-lg text-error hover:bg-error-container/10 transition-all active:scale-[0.98] font-body-secondary text-body-secondary"
          >
            <span class="material-symbols-outlined" data-icon="logout"
              >logout</span
            ><span class="">退出登录</span>
          </button>
        </div>
      </aside>
      <!-- Main Content Area -->
      <section class="flex-1 overflow-y-auto p-layout-margin custom-scrollbar">
        <div class="max-w-[720px]">
          <header class="mb-xl">
            <h2
              class="text-display-title font-display-title text-on-background"
            >
              偏好设置
            </h2>

              自定义您的个性化理财体验
            </p>
          </header>
          <div class="space-y-lg">
            <!-- General Settings Section -->

            <!-- Display Settings Section -->

            >

                显示设置
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
                <!-- Default Page -->
                <div class="space-y-xs">
                  <label
                    class="text-text-secondary font-label-helper text-label-helper px-base"
                    >默认显示页面</label
                  >
                  <div class="relative">
                    <select
                      class="w-full border rounded-lg outline-none appearance-none cursor-pointer bg-surface border-border px-md py-sm text-body-main focus:ring-2 focus:ring-primary/10 focus:border-primary"

                      <option selected="" value="dashboard">

                      </option>

                    </select>

                      class="absolute -translate-y-1/2 pointer-events-none material-symbols-outlined right-3 top-1/2 text-text-secondary"

                  </div>
                </div>
                <!-- Items per page -->

                  <label
                    class="text-text-secondary font-label-helper text-label-helper px-base"
                    >每页显示条数</label
                  >
                  <div class="relative">
                    <select
                      class="w-full border rounded-lg outline-none appearance-none cursor-pointer bg-surface border-border px-md py-sm text-body-main focus:ring-2 focus:ring-primary/10 focus:border-primary"
                    >
                      <option value="10">10 条</option>
                      <option selected="" value="20">20 条</option>
                      <option value="50">50 条</option>
                    </select>
                    <span
                      class="absolute -translate-y-1/2 pointer-events-none material-symbols-outlined right-3 top-1/2 text-text-secondary"
                      data-icon="expand_more"

            </div>
            <!-- Notifications Section -->

            >
              <h3 class="font-headline-card text-headline-card text-on-surface">
                消息通知

                <!-- Reminder Toggle -->

                      <p

          >receipt_long</span

      ><button class="flex flex-col items-center gap-1 text-primary">
        <span
          class="material-symbols-outlined"
          data-icon="settings"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >settings</span
        ><span class="text-[10px]">设置</span>
      </button>
    </nav>
    <script>
      // Simple micro-interaction for toggle switches
      document.querySelectorAll('input[type="checkbox"]').forEach((toggle) => {
        toggle.addEventListener("change", function () {
          const parent = this.closest(".bg-surface-container-low");
          if (this.checked) {
            parent.classList.add("ring-1", "ring-primary/20");
          } else {
            parent.classList.remove("ring-1", "ring-primary/20");
          }
        });
      });

      // Hover effect for select containers
      document.querySelectorAll("select").forEach((select) => {
        select.addEventListener("focus", () => {
          select.parentElement.classList.add("ring-2", "ring-primary/10");
        });
        select.addEventListener("blur", () => {
          select.parentElement.classList.remove("ring-2", "ring-primary/10");
        });
      });
    </script>
