<!doctype html>
<html lang="zh-CN">
  <head>

    />

              "on-secondary": "#ffffff",

              "surface-container-low": "#f3f4f5",

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fa;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .login-card {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .btn-press:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen bg-background">
    <!-- Header / Top Navigation (Suppressed per "The Destination Rule", but Brand Logo preserved) -->
    <header class="flex justify-center w-full pt-xl">
      <div class="flex items-center gap-xs">
        <span class="text-3xl material-symbols-outlined text-primary"
          >account_balance_wallet</span
        >
        <h1
          class="font-extrabold tracking-tight font-display-title text-display-title text-primary"
        >
          轻账本
        </h1>
      </div>
    </header>
    <!-- Main Content Area -->
    <main class="flex items-center justify-center flex-grow px-layout-margin">
      <div
        class="w-full max-w-md border shadow-sm bg-surface p-lg rounded-xl border-border login-card"
      >
        <!-- Branding/Identity -->
        <div class="text-center mb-lg">
          <h2
            class="font-display-title text-display-title text-text-primary mb-xs"
          >
            欢迎回来
          </h2>
          <p
            class="font-body-secondary text-body-secondary text-text-secondary"
          >
            请登录您的账户以继续管理财务
          </p>
        </div>
        <!-- Login Form -->
        <form action="#" class="space-y-md" method="POST">
          <!-- Username Field -->
          <div class="space-y-xs">
            <label
              class="block ml-1 font-label-helper text-label-helper text-on-surface-variant"
              for="username"
              >用户名 / 电子邮箱</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]"
                >person</span
              >
              <input
                class="w-full transition-all border rounded-lg outline-none pl-xl pr-md py-sm bg-surface border-border text-body-main font-body-main focus:ring-2 focus:ring-primary/10 focus:border-primary"
                id="username"
                name="username"
                placeholder="请输入您的用户名"
                required=""
                type="text"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-xs">
            <div class="flex items-center justify-between px-1">
              <label
                class="font-label-helper text-label-helper text-on-surface-variant"
                for="password"
                >密码</label
              >
              <a
                class="font-label-helper text-label-helper text-primary hover:underline"
                href="#"
                >忘记密码？</a
              >
            </div>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]"
                >lock</span
              >
              <input
                class="w-full transition-all border rounded-lg outline-none pl-xl pr-xl py-sm bg-surface border-border text-body-main font-body-main focus:ring-2 focus:ring-primary/10 focus:border-primary"
                id="password"
                name="password"
                placeholder="请输入您的密码"
                required=""
                type="password"
              />
              <button
                class="absolute transition-colors -translate-y-1/2 right-sm top-1/2 text-outline hover:text-text-primary"
                type="button"
              >
                <span class="material-symbols-outlined text-[20px]"
                  >visibility_off</span
                >
              </button>
            </div>
          </div>
          <!-- Remember Me & Login Button -->
          <div class="flex items-center gap-xs py-xs">
            <input
              class="w-4 h-4 rounded text-primary border-border focus:ring-primary"
              id="remember"
              type="checkbox"
            />
            <label
              class="select-none font-body-secondary text-body-secondary text-text-secondary"
              for="remember"
              >保持登录状态</label
            >
          </div>
          <button
            class="flex items-center justify-center w-full transition-all rounded-lg shadow-sm py-sm bg-primary text-on-primary font-headline-card hover:bg-primary-hover btn-press gap-xs"
            type="submit"
          >
            <span class="">登录</span>
            <span class="material-symbols-outlined text-[20px]"
              >arrow_forward</span
            >
          </button>
        </form>
        <!-- Registration Redirect -->
        <div class="text-center border-t mt-lg pt-lg border-border">
          <p
            class="font-body-secondary text-body-secondary text-text-secondary"
          >
            还没有账号？
            <a class="font-semibold text-primary hover:underline" href="#"
              >立即注册</a
            >
          </p>
        </div>
      </div>
    </main>
    <!-- Footer / Decorative Elements -->
    <footer class="text-center py-lg px-layout-margin">
      <p class="font-label-helper text-label-helper text-outline">
        © 2024 轻账本. 简洁、高效、专业的个人财务管理工具。
      </p>
      <!-- Social/Support Links -->
      <div class="flex justify-center gap-md mt-sm">
        <a
          class="transition-colors text-outline hover:text-text-secondary"
          href="#"
          ><span class="material-symbols-outlined text-[20px]">help</span></a
        >
        <a
          class="transition-colors text-outline hover:text-text-secondary"
          href="#"
          ><span class="material-symbols-outlined text-[20px]"
            >language</span
          ></a
        >
        <a
          class="transition-colors text-outline hover:text-text-secondary"
          href="#"
          ><span class="material-symbols-outlined text-[20px]">shield</span></a
        >
      </div>
    </footer>
    <!-- Image Illustration - Positioning as a subtle background element to maintain minimalism -->
    <div
      class="fixed bottom-0 right-0 hidden pointer-events-none p-xl lg:block opacity-10"
    >
      <img
        class="object-contain w-64 h-64"
        data-alt="A minimalist 3D isometric illustration of a sleek financial graph rising upwards. The visual style is professional with clean white surfaces, soft blue primary accents, and subtle ambient shadows. The background is a crisp white gallery space, emphasizing efficiency and clarity in financial growth. The lighting is bright and airy, typical of a modern high-end SaaS product interface."
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvhMcXaJFVvJnpeCHLWSjNl6ywlk7ZFOjV5mqaR9b2JZKA3weYWC0XcfDVy92ZA1v5ogrbWktYoyjJRho0hVoZ3UtDyONl1Z45CQHB6FLFdm7TVdKZzFlDTK0sVdf1ZYHfvuJB0xl0yM8Cjm5j1Hjn9jYF3pyfwIxYV8mkWFoA1sI4ZMiEpbtN_V-6dKqimX4LzL9Dfh0vM8qrs0AdqCXWm_2BLMfBN8zPF3xnwx_n7zC4OMd3gJbdh1N9lHQ35aS-BrwlbZcIkOmG"
      />
    </div>
    <!-- Micro-interaction Script -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const togglePassword = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById("password");
        const visibilityIcon = togglePassword.querySelector(
          ".material-symbols-outlined",
        );

        togglePassword.addEventListener("click", () => {
          const type =
            passwordInput.getAttribute("type") === "password"
              ? "text"
              : "password";
          passwordInput.setAttribute("type", type);
          visibilityIcon.textContent =
            type === "password" ? "visibility_off" : "visibility";
        });

        // Input focus atmospheric effect
        const inputs = document.querySelectorAll("input");
        inputs.forEach((input) => {
          input.addEventListener("focus", () => {
            input.parentElement.parentElement.classList.add("scale-[1.01]");
          });
          input.addEventListener("blur", () => {
            input.parentElement.parentElement.classList.remove("scale-[1.01]");
          });
        });
      });
    </script>
  </body>
</html>
