<!DOCTYPE html><html class="light" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>轻账本 - 统计报表</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .chart-container {
            position: relative;
        }
        /* Custom Tooltip Styling */
        .chart-tooltip {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .group:hover .chart-tooltip {
            opacity: 1;
        }
        /* Active Scale Micro-interaction */
        .btn-press:active {
            transform: scale(0.95);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c3c6d7",
                        "text-secondary": "#6B7280",
                        "text-primary": "#111827",
                        "background": "#f8f9fa",
                        "primary": "#004ac6",
                        "secondary": "#006c49",
                        "surface": "#FFFFFF",
                        "border": "#E5E7EB",
                        "primary-container": "#2563eb",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#434655"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "xs": "8px",
                        "xl": "32px",
                        "layout-margin": "24px",
                        "layout-gutter": "16px",
                        "md": "16px",
                        "sm": "12px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-main": ["Inter"],
                        "display-title": ["Inter"],
                        "label-helper": ["Inter"]
                    },
                    "fontSize": {
                        "body-main": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-title": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "label-helper": ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-text-primary antialiased">
<!-- TopNavBar -->
<header class="bg-surface border-b border-border sticky top-0 z-50">
<div class="flex justify-between items-center w-full px-layout-margin h-16 max-w-[1280px] mx-auto">
<div class="font-display-title text-display-title font-semibold text-primary">轻账本</div>
<nav class="hidden md:flex items-center space-x-8 h-full">
<a class="text-text-secondary hover:text-text-primary transition-colors font-body-main h-full flex items-center" href="#">首页</a>
<a class="text-text-secondary hover:text-text-primary transition-colors font-body-main h-full flex items-center" href="#">记录消费</a>
<a class="text-text-secondary hover:text-text-primary transition-colors font-body-main h-full flex items-center" href="#">消费明细</a>
<a class="text-primary border-b-2 border-primary pb-0 font-semibold h-full flex items-center" href="#">统计报表</a>
</nav>
<div class="flex items-center space-x-4">
<button class="p-2 rounded-full hover:bg-surface-container-low transition-all duration-200 btn-press">
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</button>
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-border">

</div>
</div>
</div>
</header>
<main class="max-w-[1280px] mx-auto px-layout-margin py-8">
<!-- Header & Filter Section -->
<div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
<div>
<h1 class="font-display-title text-display-title text-text-primary mb-1">统计报表</h1>
<p class="text-text-secondary font-body-secondary">洞察您的消费习惯，优化财务结构</p>
</div>
<div class="flex items-center bg-surface border border-border rounded-lg p-1">
<button class="px-4 py-1.5 rounded-md text-sm font-medium transition-all bg-primary text-white shadow-sm">最近7天</button>
<button class="px-4 py-1.5 rounded-md text-sm font-medium transition-all text-text-secondary hover:bg-surface-container-low">最近30天</button>
<button class="px-4 py-1.5 rounded-md text-sm font-medium transition-all text-text-secondary hover:bg-surface-container-low flex items-center gap-1">

</button>
</div>
</div>
<!-- Bento Grid Layout -->
<div class="grid grid-cols-12 gap-6">
<!-- Summary Card -->
<div class="col-span-12 md:col-span-4 bg-surface border border-border rounded-xl p-6 flex flex-col justify-between">
<div>
<span class="text-text-secondary text-label-helper font-label-helper uppercase tracking-wider">总支出 (CNY)</span>
<h2 class="text-3xl font-bold text-text-primary mt-2">¥ 12,480.00</h2>
<div class="flex items-center gap-2 mt-2">
<span class="flex items-center text-secondary text-sm font-medium">
<span class="material-symbols-outlined text-[18px]">trending_down</span> 12.5%
                        </span>
<span class="text-text-secondary text-xs">对比上个周期</span>
</div>
</div>
<div class="mt-8 pt-6 border-t border-border">
<div class="flex justify-between items-center mb-2">
<span class="text-text-secondary text-sm">日均消费</span>
<span class="font-semibold text-text-primary">¥ 1,782.85</span>
</div>
<div class="flex justify-between items-center">
<span class="text-text-secondary text-sm">单笔最高</span>
<span class="font-semibold text-text-primary text-error">¥ 4,200.00</span>
</div>
</div>
</div>
<!-- Spending Trend Line Chart -->
<div class="col-span-12 md:col-span-8 bg-surface border border-border rounded-xl p-6">
<div class="flex items-center justify-between mb-6">
<h3 class="font-semibold text-text-primary">消费趋势分析</h3>
<span class="material-symbols-outlined text-text-secondary cursor-pointer hover:text-primary">more_horiz</span>
</div>
<div class="h-64 relative flex items-end justify-between px-2 pt-4">
<!-- Simulated Grid Lines -->
<div class="absolute inset-x-0 bottom-0 top-4 flex flex-col justify-between pointer-events-none">
<div class="border-t border-dashed border-border w-full"></div>
<div class="border-t border-dashed border-border w-full"></div>
</div></div></div></div></main>
